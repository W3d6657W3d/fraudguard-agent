services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      LLM_PROVIDER: mock
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    depends_on:
      backend:
        condition: service_healthy
